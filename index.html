<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emy Pure</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #4d0000, #b30000);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 10px;
}

header h1 {
    font-size: 42px;
    color: black;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* PRODUCT CARD */
.product {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 420px;
    transition: 0.4s;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
}

.product:hover {
    transform: translateY(-8px) scale(1.02);
    background: rgba(255, 0, 0, 0.3);
}

/* TEXT */
.product h2 {
    font-size: 20px;
    font-weight: 500;
}

/* BUTTON STYLE (hidden but effect) */
.product::after {
    content: "Order on WhatsApp →";
    display: block;
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    opacity: 0.7;
}
</style>

</head>
<body>

<header>
    <h1>Emy Pure</h1>
</header>

<div class="container">

<div class="product" onclick="orderNow('Chocolate Coffee Face & Body Scrub')">
    <h2>☕ Chocolate Coffee Face & Body Scrub</h2>
</div>

<div class="product" onclick="orderNow('Moroccan Spa Body Scrub')">
    <h2>🧖 Moroccan Spa Body Scrub</h2>
</div>

<div class="product" onclick="orderNow('Rice Glow Scrub')">
    <h2>🌾 Rice Glow Scrub</h2>
</div>

<div class="product" onclick="orderNow('Hibiscus Body Scrub')">
    <h2>🌺 Hibiscus Body Scrub</h2>
</div>

<div class="product" onclick="orderNow('Turmeric Kojic Acid Body Scrub')">
    <h2>✨ Turmeric Kojic Acid Body Scrub</h2>
</div>

</div>

<footer>
    © 2026 Emy Pure — Glow Naturally ✨
</footer>

<script>
function orderNow(product) {
    let number = "923264017575";
    let message = "Hi! I want to order: " + product;
    let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

</body>
</html>
