<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emy Pure</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>/* HERO SECTION */
.hero {
    position: relative;
    text-align: center;
}

.hero-img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    border-radius: 0;
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    width: 90%;
}

.hero-text h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero-text p {
    font-size: 14px;
}
body {
    margin: 0;
    background: linear-gradient(135deg,#3b0000,#a80000);
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: black;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: 0.4s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* TEXT */
.card h2 {
    padding: 15px;
    font-size: 18px;
}

/* BUTTON TEXT */
.card p {
    padding: 0 15px 15px;
    font-size: 14px;
    opacity: 0.8;
}
</style>

</head>

<body>

<header>
<h1>Emy Pure</h1>
</header>

<div class="container">

<div class="card" onclick="order('Chocolate Coffee Face & Body Scrub')">
<img src="coffee.jpg">
<h2>☕ Chocolate Coffee Scrub</h2>
<p>Order on WhatsApp →</p>
</div>

<div class="card" onclick="order('Moroccan Spa Body Scrub')">
<img src="moroccan.jpg">
<h2>🧖 Moroccan Spa Scrub</h2>
<p>Order on WhatsApp →</p>
</div>

<div class="card" onclick="order('Rice Glow Scrub')">
<img src="rice.jpg">
<h2>🌾 Rice Glow Scrub</h2>
<p>Order on WhatsApp →</p>
</div>

<div class="card" onclick="order('Hibiscus Body Scrub')">
<img src="hibiscus.jpg">
<h2>🌺 Hibiscus Scrub</h2>
<p>Order on WhatsApp →</p>
</div>

<div class="card" onclick="order('Turmeric Kojic Acid Body Scrub')">
<img src="turmeric.jpg">
<h2>✨ Turmeric Kojic Scrub</h2>
<p>Order on WhatsApp →</p>
</div>

</div>

<script>
function order(product){
let number="923264017575";
let msg="Hi! I want to order: "+product;
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`,'_blank');
}
</script>

</body><div class="hero">
<img src="banner.jpg">

<div class="hero-text">
<h1>Face & Body Scrubs</h1>
<p>Glow naturally with Emy Pure ✨</p>
</div>

</div>
</html>
